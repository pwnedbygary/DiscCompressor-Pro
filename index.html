<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiscCompressor Pro</title>
  </head>
  <body>
    <div id="error-log" style="color: red; position: absolute; z-index: 9999; background: white; padding: 20px; display: none;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').style.display = 'block';
        document.getElementById('error-log').innerText += message + '\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').style.display = 'block';
        document.getElementById('error-log').innerText += event.reason + '\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
