<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  
  <!-- Outer Disc -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-width="24" opacity="0.9" filter="url(#shadow)" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-width="24" stroke-dasharray="80 40" opacity="0.5" />
  
  <!-- Inner Hole -->
  <circle cx="256" cy="256" r="48" fill="none" stroke="#ffffff" stroke-width="24" opacity="0.9" />
  
  <!-- Compression Arrows -->
  <path d="M 256 64 L 256 144 M 224 112 L 256 144 L 288 112" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 256 448 L 256 368 M 224 400 L 256 368 L 288 400" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 64 256 L 144 256 M 112 224 L 144 256 L 112 288" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 448 256 L 368 256 M 400 224 L 368 256 L 400 288" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
</svg>
